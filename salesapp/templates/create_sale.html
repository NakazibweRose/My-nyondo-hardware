{% extends 'base.html' %}
{% block content %}

<div class="card shadow-sm col-md-7 mx-auto">
    <div class="card-header bg-dark text-white">
        <h3 class="mb-0">Record A Sale</h3>
    </div>

    <div class="card-body">

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Customer Type</label>
                <select name="customer_type" class="form-select" required>
                    <option value="">Select customer type</option>
                    <option value="walk_in">Walk-in</option>
                    <option value="retail">Retail</option>
                    <option value="wholesale">Wholesale</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" name="customer_name" class="form-control" placeholder="Enter customer name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Product</label>
                <select name="product" class="form-select" required>
                    <option value="">Select product</option>

                    {% for product in products %}
                        <option value="{{ product.id }}">
                            {{ product.product_name }} | {{ product.category_name.category_name }} | UGX {{ product.selling_price }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" class="form-control" min="1" required>
            </div>

            <div class="form-check mb-3">
                <input type="checkbox" name="transport_required" class="form-check-input" id="transport_required">
                <label class="form-check-label" for="transport_required">Transport required</label>
            </div>

            <div class="mb-3">
                <label class="form-label">Distance in KM</label>
                <input type="number" name="distance" class="form-control" min="0" step="0.01" value="0">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning">
                    Save Sale
                </button>

                <a href="{% url 'home' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
