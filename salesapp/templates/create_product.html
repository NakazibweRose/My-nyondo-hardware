{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm col-md-6 mx-auto">
    <div class="card-header bg-dark text-white">
        <h3 class="mb-0">Add Product</h3>
    </div>

    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Category</label>

                <select name="category" class="form-select" required>
                    <option value="">Select category</option>

                    {% for category in categories %}
                    <option value="{{ category.id }}">
                        {{ category.category_name }}
                    </option>
                    {% endfor %} 

                    
                </select>
            
            </div>

            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <select name = "product_name" class ="form-select" required>
                    <option value ="">selectproduct</option>
                    <option value = "cement">cement</option>
                    <option value ="iron_bars">iron bars</option>
                    <option value = "nails">nails</option>
                    <option value = "wood">wood</option>
                    <option value = "roofings">roofings</option>
                    <option value = "wheelbarrows">wheelbarrows</option>
                    <option value = "wire mesh">wire mesh</option>
                    <option value = "barbed wire">barbed wire</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Unit Price</label>
                <input type="text" value="Will be updated from stock receipt" class="form-control" readonly>
                <small class="text-muted">
                    Unit price is set when stock is received.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Selling Price</label>
                <input type="text" value="Will be updated from stock receipt" class="form-control" readonly>
                <small class="text-muted">
                    Selling price is set when stock is received.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" required></textarea>
            </div>

            <button type="submit" class="btn btn-warning">Save Product</button>
            <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
