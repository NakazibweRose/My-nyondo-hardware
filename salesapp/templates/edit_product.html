{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm col-md-6 mx-auto">
    <div class="card-header bg-dark text-white">
        <h3 class="mb-0">Edit Product</h3>
    </div>

    <div class="card-body">
        <form method="POST" action="/">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Category</label>

                <select name="category" class="form-select" required>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if product.category_name.id == category.id %}selected{% endif %}>
                        {{ category.category_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" name="product_name" value="{{ product.product_name }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Current Unit Price</label>
                <input type="text" value="{{ product.unit_price }}" class="form-control" readonly>
                <small class="text-muted">
                    Unit price is controlled by stock receipts.
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" required>{{ product.description }}</textarea>
            </div>

            <button type="submit" class="btn btn-warning">Update Product</button>
            <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
