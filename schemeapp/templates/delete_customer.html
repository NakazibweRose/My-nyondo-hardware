{% extends "base.html" %}

{% block content %}
<div class="card shadow-sm col-6 mx-auto p-3 mt-4">

    <div class="card-header bg-danger text-white">
        <h4>Delete Customer</h4>
    </div>

    <div class="card-body">
        <p>Are you sure you want to delete this customer?</p>

        <h5>{{ customer }}</h5>

        <form method="POST" novalidate>
            {% csrf_token %}

            <button type="submit" class="btn btn-warning">
                Yes Delete
            </button>

            <a href="{% url 'scheme_customer_list' %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>

</div>
{% endblock %}
