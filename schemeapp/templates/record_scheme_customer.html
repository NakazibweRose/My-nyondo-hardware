{% extends 'base.html' %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header bg-dark text-white">
        <h3 class="mb-0">Record Scheme Payment</h3>
    </div>

    <div class="card-body">

        <h5 class="mb-4">
            Customer:
            <strong>{{ customer.full_name }}</strong>
        </h5>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Amount Paid</label>

                <input type="number"
                       step="0.01"
                       name="amount_paid"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Notes</label>

                <textarea name="notes"
                          rows="3"
                          class="form-control"></textarea>
            </div>

            <button type="submit"
                    class="btn btn-dark">
                Save Payment
            </button>

            <a href="{% url 'scheme_customer_list' %}"
               class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>
</div>

{% endblock %}
