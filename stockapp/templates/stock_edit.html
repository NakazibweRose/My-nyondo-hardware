{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h3>Edit Stock</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Product</label>
            <input type="text" name="product" value="{{ stock.product }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Supplier</label>
            <input type="text" name="supplier" value="{{ stock.supplier }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input type="number" name="quantity" value="{{ stock.quantity }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Unit Cost</label>
            <input type="number" name="unit_cost" value="{{ stock.unit_cost }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Selling Price</label>
            <input type="number" name="price" value="{{ stock.price }}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Amount Paid</label>
            <input type="number" name="amount_paid" value="{{ stock.amount_paid }}" class="form-control">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" name="is_paid" class="form-check-input" {% if stock.is_paid %}checked{% endif %}>
            <label class="form-check-label">Paid</label>
        </div>

        <button type="submit" class="btn btn-primary">Update Stock</button>
        <a href="{% url 'stock_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
